<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:'Poppins',sans-serif;
    background:#050505;
    color:white;
    padding:18px;
}

.title{
    font-size:32px;
    font-weight:700;
    margin-bottom:5px;
    background:linear-gradient(to right,#ff0055,#ff7b00);
    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;
}

.desc{
    color:#888;
    font-size:13px;
    margin-bottom:25px;
}

.grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
    gap:16px;
}

.card{
    background:#101010;
    border-radius:20px;
    overflow:hidden;
    border:1px solid rgba(255,255,255,.05);
    transition:.3s;
}

.card:hover{
    transform:translateY(-5px);
}

.thumbnail{
    position:relative;
    height:240px;
}

.thumbnail img{
    width:100%;
    height:100%;
    object-fit:cover;
}

.overlay{
    position:absolute;
    inset:0;
    background:linear-gradient(to top,rgba(0,0,0,.7),transparent);
}

.play{
    position:absolute;
    inset:0;
    display:flex;
    justify-content:center;
    align-items:center;
}

.play a{
    width:60px;
    height:60px;
    border-radius:50%;
    background:rgba(255,255,255,.15);
    backdrop-filter:blur(10px);
    display:flex;
    justify-content:center;
    align-items:center;
    text-decoration:none;
    color:white;
    font-size:22px;
    transition:.3s;
}

.play a:hover{
    background:#ff0055;
    transform:scale(1.1);
}

.info{
    padding:14px;
}

.info h3{
    font-size:15px;
    margin-bottom:5px;
}

.meta{
    color:#888;
    font-size:12px;
}

.badge{
    position:absolute;
    top:12px;
    left:12px;
    background:#ff0055;
    color:white;
    padding:4px 10px;
    border-radius:30px;
    font-size:11px;
    font-weight:600;
    z-index:2;
}

@media(max-width:768px){

.grid{
    grid-template-columns:repeat(2,1fr);
}

.thumbnail{
    height:200px;
}

.title{
    font-size:26px;
}

}

</style>
</head>
