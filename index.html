<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Bro Chil Indo</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:'Poppins',sans-serif;
    background:#050505;
    color:white;
    padding:18px;
}

/* HEADER */

.header{
    margin-bottom:25px;
}

.title{
    font-size:32px;
    font-weight:700;
    background:linear-gradient(to right,#ff0055,#ff7b00);
    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;
}

.desc{
    color:#888;
    font-size:13px;
    margin-top:4px;
}

/* GRID */

.grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
    gap:16px;
}

/* CARD */

.card{
    background:#101010;
    border-radius:20px;
    overflow:hidden;
    transition:.3s;
    border:1px solid rgba(255,255,255,.05);
    position:relative;
}

.card:hover{
    transform:translateY(-5px);
    border:1px solid rgba(255,0,85,.3);
}

/* THUMBNAIL */

.thumbnail{
    position:relative;
    height:240px;
    overflow:hidden;
}

.thumbnail img{
    width:100%;
    height:100%;
    object-fit:cover;
    transition:.4s;
}

.card:hover img{
    transform:scale(1.05);
}

/* OVERLAY */

.overlay{
    position:absolute;
    inset:0;
    background:linear-gradient(to top,rgba(0,0,0,.7),transparent);
}

/* PLAY BUTTON */

.play{
    position:absolute;
    inset:0;
    display:flex;
    justify-content:center;
    align-items:center;
}

.play button{
    width:60px;
    height:60px;
    border-radius:50%;
    border:none;
    background:rgba(255,255,255,.12);
    backdrop-filter:blur(10px);
    color:white;
    font-size:22px;
    cursor:pointer;
    transition:.3s;
}

.play button:hover{
    background:#ff0055;
    transform:scale(1.1);
}

/* INFO */

.info{
    padding:14px;
}

.info h3{
    font-size:15px;
    margin-bottom:5px;
}

.meta{
    color:#888;
    font-size:12px;
}

/* BADGE */

.badge{
    position:absolute;
    top:12px;
    left:12px;
    background:#ff0055;
    color:white;
    padding:4px 10px;
    border-radius:30px;
    font-size:11px;
    font-weight:600;
}

/* MOBILE */

@media(max-width:768px){

.grid{
    grid-template-columns:repeat(2,1fr);
}

.thumbnail{
    height:200px;
}

.title{
    font-size:26px;
}

}

</style>
</head>
<body>

<div class="header">
